## template: jinja
#cloud-config

# ==========================================
# DEFAULT JINJA CONFIGURATIONS
# ==========================================

# --- Auth & System ---
{% set custom_ssh_key = "" %}
{% set custom_ssh_import_id = "" %}
{% set custom_user = "ubuntu" %}
{% set custom_password = "ubuntu" %}
{% set custom_pro_token = "" %}
{% set custom_hostname = "" %}
{% set custom_tld = "sunbeam" %}
{% set custom_timezone = "America/New_York" %}

# --- Snap Channels ---
{% set custom_maas_snap = True %}
{% set custom_lxd_channel = "5.21/stable" %}
{% set custom_maas_channel = "3.7/stable" %}
{% set custom_sunbeam_channel = "2024.1/stable" %}

# --- LXD Settings ---
{% set custom_lxd_project = "default" %}
{% set custom_lxd_bridge = "mbr0" %}
{% set custom_lxd_pool = "default" %}

# --- MAAS Networking ---
{% set custom_maas_user = "admin" %}
{% set custom_maas_password = "admin" %}
{% set custom_maas_email = "admin@email.com" %}
{% set custom_maas_gateway = "10.20.0.1" %}
{% set custom_maas_subnet = "10.20.0.0/22" %}
{% set custom_maas_dns = "8.8.8.8" %}
{% set custom_maas_ip_start = "10.20.3.200" %}
{% set custom_maas_ip_end = "10.20.3.254" %}
{% set custom_maas_images = "noble" %}
{% set custom_maas_db_name = "maas_db" %}
{% set custom_maas_space = "sunspace" %}

# --- OpenStack Networking ---
{% set custom_os_deployment = "sunbeam" %}
{% set custom_os_pub_api_start = "10.20.3.0" %}
{% set custom_os_pub_api_end = "10.20.3.99" %}
{% set custom_os_int_api_start = "10.20.3.100" %}
{% set custom_os_int_api_end = "10.20.3.199" %}
{% set custom_os_neutron_cidr = "10.30.0.0/22" %}
{% set custom_os_neutron_bridge = "nbr0" %}

# --- Hardware Allocation ---
# Nodes: ( CPU = 18 | RAM = 52GiB | DISK = 280GiB ) (per node)
# MAAS:  ( CPU = 4  | RAM = 8GiB  | DISK = 30GiB  ) <-- if nested

# HA Settings
{% set custom_ha_nodes = 1 %}
{% set custom_osds_per_node = 4 %}

# MAAS Region+Rack Controller (This VM - not used in this cloud-init)
{% set custom_maas_cpu = "4" %}
{% set custom_maas_ram = "8GiB" %}
{% set custom_maas_disk = "30GiB" %}

# Juju Controller Defaults per node
{% set custom_juju_cpu = "3" %}
{% set custom_juju_ram = "10GiB" %}
{% set custom_juju_disk = "30GiB" %}

# Sunbeam Controller Defaults per node
{% set custom_sunbeam_cpu = "3" %}
{% set custom_sunbeam_ram = "10GiB" %}
{% set custom_sunbeam_disk = "30GiB" %}

# Cloud Node Defaults per node
{% set custom_cloud_cpu = "12" %}
{% set custom_cloud_ram = "32GiB" %}
{% set custom_cloud_disk = "100GiB" %}
{% set custom_cloud_osd_disk = "30GiB" %}

# --- Architecture Toggle ---
{% set custom_nested_lxd = True %}

# ==========================================
# DATASOURCE PARSER (LXD vs Cloud)
# ==========================================

{% if cloud_name == "lxd" %}
  {% set meta = {} %}
  {% for key, value in ds.config.items() %}
    {% if key.startswith("user_") %}
      {% set _ = meta.__setitem__(key[5:], value) %}
    {% endif %}
  {% endfor %}
{% else %}
  {% set meta = ds.meta_data.get("meta") if ds.meta_data.get("meta") else {} %}
{% endif %}

# ==========================================
# VARIABLE BINDINGS
# ==========================================

{% set ssh_key = meta.get("ssh_key") or custom_ssh_key %}
{% set ssh_import_id = meta.get("ssh_import_id") or custom_ssh_import_id %}
{% set user = meta.get("user") or custom_user %}
{% set password = meta.get("password") or custom_password %}
{% set pro_token = meta.get("pro_token") or custom_pro_token %}
{% set hostname_base = meta.get("hostname") or custom_hostname %}
{% set tld = meta.get("tld") or custom_tld %}
{% set timezone = meta.get("timezone") or custom_timezone %}

{% set lxd_channel = meta.get("lxd_channel") or custom_lxd_channel %}
{% set maas_channel = meta.get("maas_channel") or custom_maas_channel %}
{% set sunbeam_channel = meta.get("sunbeam_channel") or custom_sunbeam_channel %}

{% set lxd_project = meta.get("lxd_project") or custom_lxd_project %}
{% set lxd_bridge = meta.get("lxd_bridge") or custom_lxd_bridge %}
{% set lxd_pool = meta.get("lxd_pool") or custom_lxd_pool %}
{% set lxd_cert_b64 = meta.get("lxd_cert_b64") %}
{% set lxd_key_b64 = meta.get("lxd_key_b64") %}

{% set maas_user = meta.get("maas_user") or custom_maas_user %}
{% set maas_password = meta.get("maas_password") or custom_maas_password %}
{% set maas_email = meta.get("maas_email") or custom_maas_email %}
{% set maas_gateway = meta.get("maas_gateway") or custom_maas_gateway %}
{% set maas_subnet = meta.get("maas_subnet") or custom_maas_subnet %}
{% set maas_dns = meta.get("maas_dns") or custom_maas_dns %}
{% set maas_ip_start = meta.get("maas_ip_start") or custom_maas_ip_start %}
{% set maas_ip_end = meta.get("maas_ip_end") or custom_maas_ip_end %}
{% set maas_images = meta.get("maas_images") or custom_maas_images %}
{% set maas_db_name = meta.get("maas_db_name") or custom_maas_db_name %}
{% set maas_space = meta.get("maas_space") or custom_maas_space %}

{% set os_deployment = meta.get("os_deployment") or custom_os_deployment %}
{% set os_pub_api_start = meta.get("os_pub_api_start") or custom_os_pub_api_start %}
{% set os_pub_api_end = meta.get("os_pub_api_end") or custom_os_pub_api_end %}
{% set os_int_api_start = meta.get("os_int_api_start") or custom_os_int_api_start %}
{% set os_int_api_end = meta.get("os_int_api_end") or custom_os_int_api_end %}
{% set os_neutron_cidr = meta.get("os_neutron_cidr") or custom_os_neutron_cidr %}
{% set os_neutron_bridge = meta.get("os_neutron_bridge") or custom_os_neutron_bridge %}

{% set ha_nodes = meta.get("ha_nodes") | default(custom_ha_nodes, true) | int %}
{% set osds_per_node = meta.get("osds_per_node") | default(custom_osds_per_node, true) | int %}

{% set juju_cpu = meta.get("juju_cpu") or custom_juju_cpu %}
{% set juju_ram = meta.get("juju_ram") or custom_juju_ram %}
{% set juju_disk = meta.get("juju_disk") or custom_juju_disk %}

{% set sunbeam_cpu = meta.get("sunbeam_cpu") or custom_sunbeam_cpu %}
{% set sunbeam_ram = meta.get("sunbeam_ram") or custom_sunbeam_ram %}
{% set sunbeam_disk = meta.get("sunbeam_disk") or custom_sunbeam_disk %}

{% set cloud_cpu = meta.get("cloud_cpu") or custom_cloud_cpu %}
{% set cloud_ram = meta.get("cloud_ram") or custom_cloud_ram %}
{% set cloud_disk = meta.get("cloud_disk") or custom_cloud_disk %}
{% set cloud_osd_disk = meta.get("cloud_osd_disk") or custom_cloud_osd_disk %}

{% if meta.get("maas_snap") is not none %}
  {% set maas_snap = (meta.get("maas_snap") | string | lower == "true") %}
{% else %}
  {% set maas_snap = (custom_maas_snap | string | lower == "true") %}
{% endif %}

{% if meta.get("nested_lxd") is not none %}
  {% set nested_lxd = (meta.get("nested_lxd") | string | lower == "true") %}
{% else %}
  {% set nested_lxd = (custom_nested_lxd | string | lower == "true") %}
{% endif %}

# Neutron CIDR fix
{% set _cidr_parts = os_neutron_cidr.split('/') %}
{% set _ip_octets = _cidr_parts[0].split('.') %}
{% set os_neutron_gateway_ip = _ip_octets[0] ~ '.' ~ _ip_octets[1] ~ '.' ~ _ip_octets[2] ~ '.1' %}
{% set os_neutron_prefix = _cidr_parts[1] %}

# ==========================================
# DYNAMIC HA NODE GENERATOR
# ==========================================

{% set hostnames_list = [] %}
{% set cpus_list = [] %}
{% set rams_list = [] %}
{% set disks_list = [] %}

# 1. Generate Juju Controllers
{% for i in range(1, ha_nodes + 1) %}
  {% set _ = hostnames_list.append("juju-controller-" ~ i) %}
  {% set _ = cpus_list.append(juju_cpu) %}
  {% set _ = rams_list.append(juju_ram) %}
  {% set _ = disks_list.append(juju_disk) %}
{% endfor %}

# 2. Generate Sunbeam Controllers
{% for i in range(1, ha_nodes + 1) %}
  {% set _ = hostnames_list.append("sunbeam-controller-" ~ i) %}
  {% set _ = cpus_list.append(sunbeam_cpu) %}
  {% set _ = rams_list.append(sunbeam_ram) %}
  {% set _ = disks_list.append(sunbeam_disk) %}
{% endfor %}

# 3. Generate Cloud Nodes
{% for i in range(1, ha_nodes + 1) %}
  {% set _ = hostnames_list.append("cloud-" ~ i) %}
  {% set _ = cpus_list.append(cloud_cpu) %}
  {% set _ = rams_list.append(cloud_ram) %}
  {% set _ = disks_list.append(cloud_disk) %}
{% endfor %}

# Compile final strings
{% set nodes_hostnames = hostnames_list | join(" ") %}
{% set nodes_cpus = cpus_list | join(" ") %}
{% set nodes_rams = rams_list | join(" ") %}
{% set nodes_disks = disks_list | join(" ") %}

# ==========================================
# DYNAMIC STORAGE CALCULATOR
# ==========================================

# Dynamic Nested Storage Calculation
{% set ns = namespace(total_storage=0) %}
{% for disk in nodes_disks.split(' ') %}
  {% set disk_val = disk | replace('GiB', '') | replace('GB', '') | int %}
  {% set ns.total_storage = ns.total_storage + disk_val %}
{% endfor %}

# Add the specific Cloud OSD disk(s) and a 10GB buffer
{% set _cloud_osd_size = cloud_osd_disk | replace('GiB', '') | replace('GB', '') | int %}
{% set total_osd_storage = _cloud_osd_size * osds_per_node * ha_nodes %}
{% set final_total = ns.total_storage + total_osd_storage + 10 %}
{% set nested_storage = final_total | string ~ 'GiB' %}

# ==========================================
# STANDARD CLOUD-INIT EXECUTION
# ==========================================

# Create Hostname / FQDN
{% set base_name = local_hostname if hostname_base == "" else hostname_base %}
{% if tld %}
fqdn: {{ base_name }}.{{ tld }}
prefer_fqdn_over_hostname: true
{% else %}
hostname: {{ base_name }}
{% endif %}

# Create user and config auth
users:
  - name: {{ user }}
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: adm, sys, lxd, sudo
    shell: /bin/bash
{% if not ssh_key and not ssh_import_id %}
    plain_text_passwd: "{{ password }}"
    lock_passwd: false
{% endif %}
{% if ssh_key %}
    ssh_authorized_keys:
      - {{ ssh_key }}
{% endif %}
{% if ssh_import_id %}
    ssh_import_id:
      - {{ ssh_import_id }}
{% endif %}

# Enable SSH Password Auth ONLY if no keys are provided
{% if not ssh_key and not ssh_import_id %}
ssh_pwauth: true
{% else %}
ssh_pwauth: false
{% endif %}

# Config Ubuntu Pro
{% if pro_token %}
ubuntu_pro:
  token: {{ pro_token }}
{% endif %}

{% if nested_lxd %}
# If Nested: Seed the LXD database natively via cloud-init
lxd:
  preseed: |
    config:
      core.https_address: '[::]:8444'
    networks:
    - config:
        ipv4.address: {{ maas_gateway }}/{{ maas_subnet.split('/')[1] }}
        ipv4.dhcp: "false"
        ipv4.nat: "true"
        ipv6.address: none
      description: "Non-DHCP NAT bridge for MAAS"
      name: {{ lxd_bridge }}
      type: bridge
      project: default
    - config:
        ipv4.address: {{ os_neutron_gateway_ip }}/{{ os_neutron_prefix }}
        ipv4.dhcp: "true"
        ipv4.nat: "true"
        ipv6.address: none
      description: "Neutron managed bridge"
      name: {{ os_neutron_bridge }}
      type: bridge
      project: default
    storage_pools:
    - config:
        size: {{ nested_storage }}
      description: "Nested ZFS Storage"
      name: default
      driver: zfs 
    profiles:
    - config:
        limits.cpu: "2"
        limits.memory: 6GiB
      description: "Default LXD profile"
      devices:
        eth0:
          name: eth0
          network: {{ lxd_bridge }}
          type: nic
        root:
          path: /
          pool: default
          type: disk
      name: default
    projects: []
    cluster: null
{% endif %}

write_files:
# Auto login script helper function (MAAS - LXD - Sunbeam)
- path: /etc/profile.d/maas-login.sh
  permissions: '0644'
  content: |
    if [ "$USER" = "{{ user }}" ]; then
        ADMIN_USER="{{ maas_user }}"
        if command -v maas >/dev/null 2>&1 && sudo maas apikey --username $ADMIN_USER >/dev/null 2>&1; then
            maas login $ADMIN_USER 'http://localhost:5240/MAAS/' $(sudo maas apikey --username $ADMIN_USER) >/dev/null 2>&1
        fi

        if command -v lxc >/dev/null 2>&1; then
            {% if not nested_lxd %}
            lxc remote switch host-lxd >/dev/null 2>&1 || true
            {% endif %}
            {% if lxd_project != "default" %}
            lxc project switch {{ lxd_project }} >/dev/null 2>&1 || true
            {% endif %}
        fi

        if [ -f "/home/{{ user }}/sunrc" ]; then
            source /home/{{ user }}/sunrc
        fi
    fi

# MAAS Pretty table JSON parser - maast()
- path: /usr/local/bin/maast
  permissions: '0755'
  content: |
    #!/bin/bash
    out=$(maas "$@")
    ret=$?

    if [ $ret -ne 0 ] || [ -z "$out" ] || ! echo "$out" | jq -e . >/dev/null 2>&1; then
        echo "$out"
        exit $ret
    fi

    target="$2"

    # Helper function to align and draw OpenStack-style tables
    prettify() {
        python3 -c '
    import sys
    # 1. Read input and strip empty lines
    raw_lines = [line.strip("\n").split("\t") for line in sys.stdin if line.strip("\n")]
    
    # 2. Handle completely empty results gracefully
    if not raw_lines:
        print("\n[ No records found. ]\n")
        sys.exit(0)
    
    # 3. Remove the legacy dash separator from jq if it exists
    if len(raw_lines) > 1 and all(cell.replace("-", "").strip() == "" for cell in raw_lines[1]):
        raw_lines.pop(1)
        
    # 4. Catch empty strings and convert to "-" for a solid grid
    lines = [["-" if cell == "" or cell == "null" else cell for cell in row] for row in raw_lines]
        
    # 5. Calculate optimal column widths
    col_widths = [max(len(str(item)) for item in col) for col in zip(*lines)]
    
    def print_sep():
        print("+" + "+".join("-" * (w + 2) for w in col_widths) + "+")
        
    print("")
    print_sep()
    # 6. Print headers CENTERED
    print("| " + " | ".join(str(item).center(w) for item, w in zip(lines[0], col_widths)) + " |")
    print_sep()
    
    # 7. Print data LEFT-ALIGNED
    for row in lines[1:]:
        row_ext = row + [""] * (len(col_widths) - len(row))
        print("| " + " | ".join(str(item).ljust(w) for item, w in zip(row_ext, col_widths)) + " |")
        
    print_sep()
    print("")
    '
    }

    case "$target" in
        machines|machine|nodes|node)
            echo "$out" | jq -r '(["HOSTNAME", "STATUS", "POWER", "PWR TYPE", "IP ADDRESS", "SYSTEM ID"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.hostname, .status_name, .power_state, (.power_type // "-"), (.ip_addresses[0] // "-"), .system_id]) | @tsv' | prettify
            ;;
        block-devices|block-device)
            echo "$out" | jq -r '(["ID", "NAME", "TYPE", "SIZE", "MODEL", "TAGS"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.id, .name, .type, .size, (.model // "-"), (.tags | join(",") // "-")]) | @tsv' | prettify
            ;;
        partitions|partition)
            echo "$out" | jq -r '(["ID", "PATH", "SIZE", "FSTYPE", "UUID"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.id, .path, .size, (.fstype // "-"), (.uuid // "-")]) | @tsv' | prettify
            ;;
        interfaces|interface)
            echo "$out" | jq -r '(["ID", "NAME", "TYPE", "MAC ADDRESS", "VLAN", "TAGS"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.id, .name, .type, (.mac_address // "-"), (.vlan.vid // "-"), (.tags | join(",") // "-")]) | @tsv' | prettify
            ;;
        tags|tag)
            echo "$out" | jq -r '(["NAME", "COMMENT", "NODES"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.name, (.comment // "-"), (.node_count // "-")]) | @tsv' | prettify
            ;;
        subnets|subnet)
            echo "$out" | jq -r '(["NAME", "CIDR", "GATEWAY", "VLAN", "FABRIC"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.name, .cidr, (.gateway_ip // "-"), .vlan.vid, .vlan.fabric]) | @tsv' | prettify
            ;;
        fabrics|fabric)
            echo "$out" | jq -r '(["ID", "NAME", "CLASS", "DESCRIPTION"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.id, .name, .class_type, (.description // "-")]) | @tsv' | prettify
            ;;
        vlans|vlan)
            echo "$out" | jq -r '(["NAME", "VID", "FABRIC", "DHCP", "SPACE"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.name, .vid, .fabric, .dhcp_on, (.space // "-")]) | @tsv' | prettify
            ;;
        spaces|space)
            echo "$out" | jq -r '(["ID", "NAME", "SUBNETS"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.id, .name, (.subnets | length)]) | @tsv' | prettify
            ;;
        ipranges|iprange)
            echo "$out" | jq -r '(["TYPE", "START IP", "END IP", "COMMENT"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.type, .start_ip, .end_ip, (.comment // "-")]) | @tsv' | prettify
            ;;
        domains|domain)
            echo "$out" | jq -r '(["NAME", "AUTHORITATIVE", "DEFAULT", "TTL"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.name, .authoritative, .is_default, (.ttl // "-")]) | @tsv' | prettify
            ;;
        rack-controllers|rack-controller)
            echo "$out" | jq -r '(["HOSTNAME", "STATUS", "ZONE", "VERSION"] | (., map(length*"-"))), ((if type=="array" then . else [.] end)[] | [.hostname, .status_name, .zone.name, .version]) | @tsv' | prettify
            ;;
        *)
            echo "$out" | python3 -c '
    import sys, json
    try:
        data = json.load(sys.stdin)
        if isinstance(data, dict): data = [data]
        if not data or not isinstance(data, list):
            print(json.dumps(data, indent=2))
            sys.exit(0)
            
        ignored_suffixes = ("_uri", "_status_name", "_test_status", "_count")
        
        keys = []
        for k, v in data[0].items():
            if not isinstance(v, (str, int, bool, float)): continue
            if any(k.endswith(s) for s in ignored_suffixes): continue
            if k == "id": continue
            keys.append(k)
            
        keys = keys[:6]
        if not keys:
            keys = [k for k, v in data[0].items() if isinstance(v, (str, int, bool, float))][:4]
            
        if not keys:
            print(json.dumps(data, indent=2))
            sys.exit(0)
            
        print("\t".join(k.upper().replace("_", " ") for k in keys))
        print("\t".join("-" * len(k) for k in keys))
        for item in data:
            print("\t".join(str(item.get(k, "-")) for k in keys))
    except Exception:
        sys.exit(1)
    ' | prettify || echo "$out" | jq -C .
            ;;
    esac

- path: /etc/profile.d/default-editor.sh
  permissions: '0644'
  content: |
    export EDITOR=nvim

- path: /etc/sudoers.d/keep-editor
  permissions: '0440'
  content: |
    Defaults env_keep += "EDITOR"

{% if not nested_lxd and lxd_cert_b64 and lxd_key_b64 %}
# Non-nested specific files (Host's LXD Certificates)
- path: /root/snap/lxd/common/config/client.crt
  owner: root:root
  permissions: '0644'
  encoding: b64
  content: {{ lxd_cert_b64 }}

- path: /root/snap/lxd/common/config/client.key
  owner: root:root
  permissions: '0600'
  encoding: b64
  content: {{ lxd_key_b64 }}
{% endif %}

packages:
  - git
  - neovim
  - pollinate
  - jq

{% if not maas_snap %}
apt:
  sources:
    maas:
      source: 'ppa:maas/{{ maas_channel.split('/')[0] }}'
{% endif %}

snap:
  commands:
  - snap install lxd --channel={{ lxd_channel }}
{% if maas_snap %}
  - snap install maas --channel={{ maas_channel }}
{% endif %}
  - snap install openstack --channel={{ sunbeam_channel }}

package_update: true
package_upgrade: true
package_reboot_if_required: true

timezone: {{ timezone }}

random_seed:
  command: [pollinate]
  command_required: true
  file: /dev/urandom

runcmd:

{% if not maas_snap %}

# Install MAAS (not using apt module or else bind conflicts with LXD)
- echo "\n\n-------- Installing deb MAAS... --------\n"

- apt-get update
- apt-get install -y maas

{% endif %}

# Verify critical dependencies
- echo "\n\n-------- Verifying dependencies... --------\n"
- |
  for cmd in lxc jq maas sunbeam; do
    if ! command -v $cmd >/dev/null 2>&1; then
      echo "CRITICAL ERROR: Required command '$cmd' not found."
      echo "Snap/apt package installation likely failed due to a network error."
      exit 1
    fi
  done
  echo "All dependencies verified successfully!"

# Export variables
- echo "\n\n-------- Exporting variables... --------\n"

# --- Networking ---
- export IP_ADDRESS=$(hostname -I | awk '{print $1}')
- export INTERFACE=$(ip -j route show default | jq -r '.[].dev')

# --- Auth & System ---
- export SSH_KEY="{{ ssh_import_id }}"
- export ADMIN_USER="{{ maas_user }}"
- export ADMIN_PASS="{{ maas_password }}"
- export ADMIN_EMAIL="{{ maas_email }}"
- export RUN_AS="sudo -u {{ user }}"
- export RUN_AS_LOGIN="sudo -i -u {{ user }}"

# --- LXD Settings ---
- export LXD_PROJECT="{{ lxd_project }}"
- export LXD_BRIDGE="{{ lxd_bridge }}"
- export LXD_POOL="{{ lxd_pool }}"
{% if nested_lxd %}
- export LXD_ADDR="${IP_ADDRESS}:8444"
- export LXD_CERT="/root/lxd-local.crt"
- export LXD_KEY="/root/lxd-local.key"
{% else %}
- export LXD_ADDR="{{ maas_gateway }}:8443"
- export LXD_CERT="/root/snap/lxd/common/config/client.crt"
- export LXD_KEY="/root/snap/lxd/common/config/client.key"
{% endif %}

# --- MAAS Networking ---
- export MAAS_DOMAIN_NAME="{{ tld if tld else 'maas' }}"
- export MAAS_GATEWAY="{{ maas_gateway }}"
- export MAAS_SUBNET="{{ maas_subnet }}"
- export MAAS_DNS="{{ maas_dns }}"
- export MAAS_RESERVED_IP_START="{{ maas_ip_start }}"
- export MAAS_RESERVED_IP_END="{{ maas_ip_end }}"
- export MAAS_IMAGES="{{ maas_images }}"
- export MAAS_DB_NAME="{{ maas_db_name }}"
- export MAAS_SPACE="{{ maas_space }}"

# --- OpenStack Networking ---
- export OS_DEPLOYMENT_NAME="{{ os_deployment }}"
- export OS_PUBLIC_API_IP_START="{{ os_pub_api_start }}"
- export OS_PUBLIC_API_IP_END="{{ os_pub_api_end }}"
- export OS_INTERNAL_API_IP_START="{{ os_int_api_start }}"
- export OS_INTERNAL_API_IP_END="{{ os_int_api_end }}"
- export OS_NEUTRON_BRIDGE="{{ os_neutron_bridge }}"
- export OS_NEUTRON_CIDR="{{ os_neutron_cidr }}"

# --- Hardware Allocation ---
- export NODES_HOSTNAMES="{{ nodes_hostnames }}"
- export NODES_CPUS="{{ nodes_cpus }}"
- export NODES_RAMS="{{ nodes_rams }}"
- export NODES_DISKS="{{ nodes_disks }}"

- export HA_NODES="{{ ha_nodes }}"
- export CLOUD_OSD_DISK="{{ cloud_osd_disk }}"
- export OSDS_PER_NODE="{{ osds_per_node }}"

{% if maas_snap %}

# Install PostgreSQL
- echo "\n\n-------- Install PostgreSQL... --------\n"

- systemctl disable --now systemd-timesyncd
- apt-get update
- apt-get install -y postgresql

# Configure PostgreSQL
- echo "\n\n-------- Configure PostgreSQL... --------\n"

- sudo -i -u postgres psql -c "CREATE USER \"$ADMIN_USER\" WITH ENCRYPTED PASSWORD '$ADMIN_PASS'"
- sudo -i -u postgres createdb -O "$ADMIN_USER" "$MAAS_DB_NAME"
- sed -i "1i host    $MAAS_DB_NAME    $ADMIN_USER    0/0     md5" /etc/postgresql/*/main/pg_hba.conf

# Initialise snap MAAS
- echo "\n\n-------- Initializing snap MAAS... --------\n"

- maas init region+rack --database-uri "postgres://$ADMIN_USER:$ADMIN_PASS@$HOSTNAME/$MAAS_DB_NAME" --maas-url http://${IP_ADDRESS}:5240/MAAS
- maas createadmin --username $ADMIN_USER --password $ADMIN_PASS --email $ADMIN_EMAIL {% if ssh_import_id %}--ssh-import $SSH_KEY{% endif %}

{% else %}

# Initialise deb MAAS
- echo "\n\n-------- Initializing deb MAAS... --------\n"

- maas init --admin-username $ADMIN_USER --admin-password $ADMIN_PASS --admin-email $ADMIN_EMAIL {% if ssh_import_id %}--admin-ssh-import $SSH_KEY{% endif %} --rbac-url "" --candid-agent-file ""

{% endif %}

# Wait for MAAS services to be ready
- |
  echo "\n\n-------- Waiting for MAAS API to be ready... --------\n"
  
  sleep 30
  until maas login $ADMIN_USER 'http://localhost:5240/MAAS/' $(maas apikey --username $ADMIN_USER) > /dev/null 2>&1; do
    echo "MAAS is not ready yet (502). Retrying in 30 seconds..."
    sleep 30
  done

# Grab API key and login as admin
- echo "\n\n-------- Logging in as '$ADMIN_USER' user... --------\n"

- export APIKEY=$(maas apikey --username $ADMIN_USER)
- maas login $ADMIN_USER 'http://localhost:5240/MAAS/' $APIKEY

- maas $ADMIN_USER maas set-config name=maas_name value=$LXD_PROJECT name=completed_intro value=true

# Automatically create and add ssh keys to MAAS
- echo "\n\n-------- Generating SSH keys and adding them to MAAS... --------\n"

- ssh-keygen -q -t rsa -N "" -f "/home/{{ user }}/.ssh/id_rsa"
- chown {{ user }}:{{ user }} /home/{{ user }}/.ssh/id_rsa /home/{{ user }}/.ssh/id_rsa.pub
- chmod 600 /home/{{ user }}/.ssh/id_rsa
- chmod 644 /home/{{ user }}/.ssh/id_rsa.pub
- maas $ADMIN_USER sshkeys create key="$(cat /home/{{ user }}/.ssh/id_rsa.pub)"

# Configure MAAS networking (set gateways, vlans, DHCP on etc)
- echo "\n\n-------- Configuring MAAS networking... --------\n"

- export FABRIC_ID=$(maas $ADMIN_USER subnet read "$MAAS_SUBNET" | jq -r ".vlan.fabric_id")
- export VLAN_TAG=$(maas $ADMIN_USER subnet read "$MAAS_SUBNET" | jq -r ".vlan.vid")
- export PRIMARY_RACK=$(maas $ADMIN_USER rack-controllers read | jq -r ".[] | .system_id")

- maast $ADMIN_USER subnet update $MAAS_SUBNET gateway_ip=$MAAS_GATEWAY
- maast $ADMIN_USER ipranges create type=dynamic start_ip=$MAAS_RESERVED_IP_START end_ip=$MAAS_RESERVED_IP_END
- maast $ADMIN_USER ipranges create type=reserved start_ip=$OS_INTERNAL_API_IP_START end_ip=$OS_INTERNAL_API_IP_END comment="${OS_DEPLOYMENT_NAME}-internal-api"
- maast $ADMIN_USER ipranges create type=reserved start_ip=$OS_PUBLIC_API_IP_START end_ip=$OS_PUBLIC_API_IP_END comment="${OS_DEPLOYMENT_NAME}-public-api"
- maast $ADMIN_USER vlan update $FABRIC_ID $VLAN_TAG dhcp_on=true primary_rack=$PRIMARY_RACK
- maast $ADMIN_USER maas set-config name=upstream_dns value=$MAAS_DNS

# Set the MAAS domain name
- |
  echo "\n\n-------- Configuring MAAS domain '$MAAS_DOMAIN_NAME'... --------\n"
  
  # Check if MAAS auto-created the domain during initialization
  EXISTING_DOMAIN_ID=$(maas $ADMIN_USER domains read | jq -r '.[] | select(.name=="'$MAAS_DOMAIN_NAME'") | .id')
  
  if [ -n "$EXISTING_DOMAIN_ID" ] && [ "$EXISTING_DOMAIN_ID" != "null" ]; then
    echo "Domain '$MAAS_DOMAIN_NAME' already exists! Setting as default and authoritative..."
    export MAAS_DOMAIN_NAME_ID=$EXISTING_DOMAIN_ID
    maast $ADMIN_USER domain update $MAAS_DOMAIN_NAME_ID authoritative=true
    maast $ADMIN_USER domain set-default $MAAS_DOMAIN_NAME_ID
  else
    echo "Domain not found. Renaming default domain to '$MAAS_DOMAIN_NAME'..."
    export MAAS_DOMAIN_NAME_ID=$(maas $ADMIN_USER domains read | jq -r '.[] | select(.is_default==true) | .id')
    maast $ADMIN_USER domain update $MAAS_DOMAIN_NAME_ID name=$MAAS_DOMAIN_NAME authoritative=true
  fi
  
  # Update the rack controller to use the correct domain
  maast $ADMIN_USER rack-controller update $PRIMARY_RACK domain=$MAAS_DOMAIN_NAME

# Add MAAS DNS to host
- |
  cat <<EOF > /etc/netplan/99-maas-dns.yaml
  network:
    version: 2
    ethernets:
      $INTERFACE:
        nameservers:
          addresses: [$IP_ADDRESS]
          search: [$MAAS_DOMAIN_NAME, maas]
  EOF

- chmod 600 /etc/netplan/99-maas-dns.yaml
- netplan apply

# Configure boot images
- echo "\n\n-------- Configuring MAAS boot images... --------\n"

- export BOOT_SOURCE_ID=$(maas $ADMIN_USER boot-sources read | jq -r '.[0].id')
- |
  for RELEASE in $MAAS_IMAGES; do
    maas $ADMIN_USER boot-source-selections create $BOOT_SOURCE_ID os="ubuntu" release="$RELEASE" arches="amd64" labels='*' subarches='*'
  done
- maas $ADMIN_USER boot-resources import

# Wait for MAAS boot images to be ready
- |
  echo "\n\n-------- Waiting for all MAAS boot images to sync... --------\n"
  
  while true; do
    missing_images=false
    
    importing_status=$(maas $ADMIN_USER boot-resources is-importing)
    requested_releases=$(maas $ADMIN_USER boot-source-selections read $BOOT_SOURCE_ID | jq -r '.[].release')
    downloaded_releases=$(maas $ADMIN_USER boot-resources read | jq -r '.[].name' | sort | uniq)
    
    # Check if the image has been downloaded
    for release in $requested_releases; do
      if echo "$downloaded_releases" | grep -q "$release"; then
         # Image exists. Now check if import is finished
         if [ "$importing_status" = "false" ]; then
             echo "  Image '$release' has downloaded!"
         else
             echo "  Image '$release' is currently syncing..."
             missing_images=true
         fi
      else
         echo "  Image '$release' was not found in boot resources..."
         missing_images=true
      fi
    done
    
    # Check for missing images
    if [ "$missing_images" = "false" ]; then
      clean_list=$(echo "$requested_releases" | tr '\n' ' ')
      echo "All selected boot images ( $clean_list) are fully synced!"
      maast $ADMIN_USER boot-resources read
      break
    fi
    
    echo "Some images are missing. Waiting 30s..."
    sleep 30
  done

{% if nested_lxd %}

# Generate local LXD trust certificate
- echo "\n\n-------- Generating trust certificate for local LXD... --------\n"

- openssl req -x509 -newkey rsa:2048 -keyout $LXD_KEY -out $LXD_CERT -nodes -days 3650 -subj "/CN=lxd-local"
- lxc config trust add $LXD_CERT --name lxd-local

# Provide certs to user context
- $RUN_AS mkdir -p /home/{{ user }}/snap/lxd/common/config
- cp $LXD_CERT /home/{{ user }}/snap/lxd/common/config/client.crt
- cp $LXD_KEY /home/{{ user }}/snap/lxd/common/config/client.key
- chown -R {{ user }}:{{ user }} /home/{{ user }}/snap/lxd/common/config

{% else %}

# Setup external LXD client certificates and remote connection
- echo "\n\n-------- Configuring remote LXD connection... --------\n"

- lxc remote add host-lxd https://$LXD_ADDR --accept-certificate
- lxc remote switch host-lxd

# Provide certs to user context
- $RUN_AS mkdir -p /home/{{ user }}/snap/lxd/common/config
- cp $LXD_CERT /home/{{ user }}/snap/lxd/common/config/client.crt
- cp $LXD_KEY /home/{{ user }}/snap/lxd/common/config/client.key
- chown -R {{ user }}:{{ user }} /home/{{ user }}/snap/lxd/common/config
- $RUN_AS lxc remote add host-lxd https://$LXD_ADDR --accept-certificate

{% endif %}


{% if lxd_project != "default" %}

# Switch to LXD MAAS project
- echo "\n\n-------- Switching to LXD '$LXD_PROJECT' project... --------\n"

- lxc project switch $LXD_PROJECT

{% endif %}

# Create VMs directly via LXD
- echo "\n\n-------- Creating empty VMs in LXD... --------\n"
- |
  i=1
  for HOST in $NODES_HOSTNAMES; do
    CPU=$(echo "$NODES_CPUS" | cut -d' ' -f$i)
    RAM=$(echo "$NODES_RAMS" | cut -d' ' -f$i)
    DISK=$(echo "$NODES_DISKS" | cut -d' ' -f$i)
    
    lxc init "$HOST" --vm --empty -c limits.cpu="$CPU" -c limits.memory="$RAM" -d root,size="$DISK"
    
    i=$((i + 1))
  done

# Attach specific extra devices to the cloud nodes
- |
  for HOST in $NODES_HOSTNAMES; do
    case "$HOST" in
      cloud-*)
        # Loop to create and attach multiple OSD disks
        for i in $(seq 1 $OSDS_PER_NODE); do
          lxc storage volume create $LXD_POOL ${HOST}-osd${i}-disk size=$CLOUD_OSD_DISK --type=block
          lxc config device add $HOST osd${i} disk pool=$LXD_POOL source=${HOST}-osd${i}-disk
        done
        
        # Attach Neutron networking
        lxc config device add $HOST eth1 nic nictype=bridged parent="$OS_NEUTRON_BRIDGE"
        ;;
    esac
  done

# Start VMs to trigger PXE Boot & Enlistment
- echo "\n\n-------- Starting VMs for MAAS enlistment... --------\n"
- |
  for HOST in $NODES_HOSTNAMES; do
    lxc start $HOST
  done

# Wait for VMs to enlist in MAAS via MAC
- |
  echo "\n\n-------- Waiting for all VMs to enlist in MAAS... --------\n"
  
  while true; do
    all_enlisted=true
    
    for HOST in $NODES_HOSTNAMES; do
      # Fetch the dynamic MAC to identify the machine in MAAS
      MAC=$(lxc config get $HOST volatile.eth0.hwaddr)
      SYSTEM_ID=$(maas $ADMIN_USER machines read mac_address=$MAC | jq -r '.[0].system_id')
      status=$(maas $ADMIN_USER machines read mac_address=$MAC | jq -r '.[0].status_name')
      
      if [ "$SYSTEM_ID" != "null" ] && [ "$status" = "New" ]; then
        echo "  [OK] '$HOST' was enlisted with ID '$SYSTEM_ID'!"
      else
        if [ "$status" = "null" ]; then
           status="Waiting for PXE"
        fi
        echo "  [..] '$HOST' ($MAC) is currently '$status'..."
        all_enlisted=false
      fi
    done
    
    # If the flag is still true, everyone is enlisted -> break the loop
    if [ "$all_enlisted" = true ]; then
      echo "All VMs have successfully enlisted!\n"
      lxc list
      sleep 10
      break
    fi
    
    echo "Waiting 30s before next check..."
    sleep 30
  done

# Create Availability Zones in MAAS
- |
  echo "\n\n-------- Creating Availability Zones... --------\n"
  for i in $(seq 1 $HA_NODES); do
    ZONE="AZ$i"
    if ! maas $ADMIN_USER zones read | jq -e ".[] | select(.name==\"$ZONE\")" > /dev/null; then
      echo "Creating zone: $ZONE"
      maast $ADMIN_USER zones create name="$ZONE" description="Auto-generated AZ for HA Node $i"
    else
      echo "Zone $ZONE already exists."
    fi
  done
  
  echo "Assigning Primary MAAS Controller to AZ1..."
  maast $ADMIN_USER rack-controller update "$PRIMARY_RACK" zone="AZ1"

# Find machines by MAC and set hostnames, domain, and explicit LXD power controls
- |
  echo "\n\n-------- Configuring hostnames and power controls... --------\n"
  
  LXD_CERT_CONTENT=$(cat $LXD_CERT)
  LXD_KEY_CONTENT=$(cat $LXD_KEY)
  
  for HOST in $NODES_HOSTNAMES; do
    MAC=$(lxc config get $HOST volatile.eth0.hwaddr)
    SYSTEM_ID=$(maas $ADMIN_USER machines read mac_address=$MAC | jq -r '.[0].system_id')

    NODE_NUM=$(echo "$HOST" | awk -F'-' '{print $NF}')
    TARGET_ZONE="AZ${NODE_NUM}"
    
    # Force the MAAS hostname, domain, and explicit LXD power controls
    maast $ADMIN_USER machine update $SYSTEM_ID \
      hostname=$HOST \
      domain=$MAAS_DOMAIN_NAME_ID \
      zone=$TARGET_ZONE \
      power_type="lxd" \
      power_parameters_power_address="https://$LXD_ADDR" \
      power_parameters_certificate="$LXD_CERT_CONTENT" \
      power_parameters_key="$LXD_KEY_CONTENT" \
      power_parameters_instance_name="$HOST" \
      power_parameters_project="$LXD_PROJECT"
  done

# Commission machines
- echo "\n\n-------- Commissioning machines... --------\n"
- |
  for HOST in $NODES_HOSTNAMES; do
    SYSTEM_ID=$(maas $ADMIN_USER machines read hostname=$HOST | jq -r '.[0].system_id')
    maast $ADMIN_USER machine commission $SYSTEM_ID
  done

# Wait for VMs to be ready
- |
  echo "\n\n-------- Waiting for VMs to enter 'Ready' state... --------\n"
  
  while true; do
    all_ready=true
    
    for HOST in $NODES_HOSTNAMES; do
      # Query MAAS for the status
      status=$(maas $ADMIN_USER machines read hostname=$HOST | jq -r '.[0].status_name')
      
      if [ "$status" = "Ready" ]; then
        echo "  [OK] '$HOST' is '$status'!"
      else
        echo "  [..] '$HOST' is currently '$status'..."
        all_ready=false
      fi
    done
    
    # If the flag is still true, everyone is ready -> break the loop
    if [ "$all_ready" = true ]; then
      echo "All VMs are Ready!"
      maast $ADMIN_USER machines read
      sleep 10
      break
    fi
    
    echo "Waiting 60s before checking again..."
    sleep 60
  done

# Create tags and add them to commissioned machines
- echo "\n\n-------- Creating and adding tags... --------\n"
- |
  maast $ADMIN_USER tags create name=openstack-${OS_DEPLOYMENT_NAME}
  maast $ADMIN_USER tags create name=control
  maast $ADMIN_USER tags create name=compute
  maast $ADMIN_USER tags create name=storage
  maast $ADMIN_USER tags create name=network
  maast $ADMIN_USER tags create name=sunbeam
  maast $ADMIN_USER tags create name=juju-controller

  for HOST in $NODES_HOSTNAMES; do
    SYSTEM_ID=$(maas $ADMIN_USER machines read hostname=$HOST | jq -r '.[0].system_id')

    # Tag main disks as SSDs
    echo "\n\n-------- Tagging main disks as SSDs... --------\n"
    
    MAIN_BLOCK_ID=$(maas $ADMIN_USER block-devices read $SYSTEM_ID | jq -r '.[] | select(.serial == "lxd_root" or .name == "sda" or .name == "vda") | .id' | head -n 1)
    if [ -n "$MAIN_BLOCK_ID" ] && [ "$MAIN_BLOCK_ID" != "null" ]; then
      maast $ADMIN_USER block-device add-tag $SYSTEM_ID $MAIN_BLOCK_ID tag=ssd
      maast $ADMIN_USER block-device remove-tag $SYSTEM_ID $MAIN_BLOCK_ID tag=rotary
      maast $ADMIN_USER block-device remove-tag $SYSTEM_ID $MAIN_BLOCK_ID tag=1rpm
    fi
    
    # Base tag for all nodes
    maast $ADMIN_USER tag update-nodes openstack-${OS_DEPLOYMENT_NAME} add=$SYSTEM_ID
    
    case "$HOST" in
      juju-controller-*)
        maast $ADMIN_USER tag update-nodes juju-controller add=$SYSTEM_ID
        ;;
        
      sunbeam-controller-*)
        maast $ADMIN_USER tag update-nodes sunbeam add=$SYSTEM_ID
        ;;
        
      cloud-*)
        maast $ADMIN_USER tag update-nodes control add=$SYSTEM_ID
        maast $ADMIN_USER tag update-nodes compute add=$SYSTEM_ID
        maast $ADMIN_USER tag update-nodes storage add=$SYSTEM_ID
        maast $ADMIN_USER tag update-nodes network add=$SYSTEM_ID
        
        # Tag the ceph osd devices
        echo "\n\n-------- Tagging ceph storage... --------\n"
        
        for i in $(seq 1 $OSDS_PER_NODE); do
          OSD_BLOCK_ID=$(maas $ADMIN_USER block-devices read $SYSTEM_ID | jq -r '.[] | select(.serial == "lxd_osd'${i}'") | .id')
          
          if [ -n "$OSD_BLOCK_ID" ] && [ "$OSD_BLOCK_ID" != "null" ]; then
            maast $ADMIN_USER block-device add-tag $SYSTEM_ID $OSD_BLOCK_ID tag=ceph
            maast $ADMIN_USER block-device add-tag $SYSTEM_ID $OSD_BLOCK_ID tag=ssd
            maast $ADMIN_USER block-device remove-tag $SYSTEM_ID $OSD_BLOCK_ID tag=rotary
            maast $ADMIN_USER block-device remove-tag $SYSTEM_ID $OSD_BLOCK_ID tag=1rpm
          fi
        done
        
        # Tag the additional neutron interface
        echo "\n\n-------- Tagging neutron interface... --------\n"
        
        CLOUD_NEUTRON_MAC=$(lxc config get $HOST volatile.eth1.hwaddr)
        CLOUD_NEUTRON_INTERFACE_ID=$(maas $ADMIN_USER interfaces read $SYSTEM_ID | jq -r '.[] | select(.mac_address=="'$CLOUD_NEUTRON_MAC'") | .id')
        if [ -n "$CLOUD_NEUTRON_INTERFACE_ID" ] && [ "$CLOUD_NEUTRON_INTERFACE_ID" != "null" ]; then
          maast $ADMIN_USER interface update $SYSTEM_ID $CLOUD_NEUTRON_INTERFACE_ID tags=neutron:physnet1
        fi
        ;;
    esac
  done

# Prepare machine for Sunbeam usage
- echo "\n\n-------- Preparing machine for Sunbeam usage... --------\n"

- $RUN_AS sunbeam prepare-node-script --client | $RUN_AS bash -x

# Add the Canonical MAAS provider
- echo "\n\n-------- Adding the Canonical MAAS provider... --------\n"

- $RUN_AS sunbeam deployment add maas $OS_DEPLOYMENT_NAME $APIKEY http://${IP_ADDRESS}:5240/MAAS

# Map network spaces to cloud networks
- echo "\n\n-------- Mapping network spaces to cloud networks... --------\n"

- maast $ADMIN_USER spaces create name=$MAAS_SPACE
- maast $ADMIN_USER vlan update $FABRIC_ID $VLAN_TAG space=$MAAS_SPACE
- $RUN_AS sunbeam deployment space map $MAAS_SPACE

# Validate MAAS provider
- echo "\n\n-------- Validating MAAS provider... --------\n"

- $RUN_AS sunbeam deployment validate

- cat /home/{{ user }}/snap/openstack/common/reports/*
- echo "\n"
- echo "Number of fails      - $(grep -c failed /home/{{ user }}/snap/openstack/common/reports/*)"
- echo "Number of warnings   - $(grep -c warning /home/{{ user }}/snap/openstack/common/reports/*)"
- echo "Number of successes  - $(grep -c success /home/{{ user }}/snap/openstack/common/reports/*)"
- echo "\n"

- $RUN_AS sunbeam deployment show $OS_DEPLOYMENT_NAME

# Generate Sunbeam deployment manifest
- echo "\n\n-------- Generating Sunbeam manifest... --------\n"
- |
  if [ "$HA_NODES" -gt "1" ]; then
    TOPOLOGY="multi"
  else
    TOPOLOGY="single"
  fi
  
  cat <<EOF > /home/{{ user }}/manifest.yaml
  core:
    config:
      proxy:
        proxy_required: false
      database: $TOPOLOGY
      region: RegionOne
      user:
        run_demo_setup: true
        username: $ADMIN_USER
        password: $ADMIN_PASS
        cidr: 192.168.0.0/24
        nameservers: $MAAS_DNS
        security_group_rules: true
        remote_access_location: local
        physnet: physnet1
      external-networks:
        physnet1:
          cidr: $OS_NEUTRON_CIDR
          network_type: flat
          nics:
  EOF
  
  # Dynamically append all cloud nodes and their neutron interfaces
  for HOST in $NODES_HOSTNAMES; do
    case "$HOST" in
      cloud-*)
        echo "          $HOST: eth1" >> /home/{{ user }}/manifest.yaml
        ;;
    esac
  done

- chown {{ user }}:{{ user }} /home/{{ user }}/manifest.yaml
- sleep 10

# Bootstrap the orchestration layer
- echo "\n\n-------- Bootstrapping the orchestration layer... --------\n"

- $RUN_AS_LOGIN  script -q -e -c "sunbeam cluster bootstrap --accept-defaults --manifest /home/{{ user }}/manifest.yaml" /dev/null

- echo "\n"
- $RUN_AS juju switch controller
- echo "\n"
- $RUN_AS juju status
- echo "\n"
- $RUN_AS juju switch openstack-infra
- echo "\n"
- $RUN_AS juju status

# Deploy the cloud
- echo "\n\n-------- Deploying the cloud... --------\n"

- $RUN_AS_LOGIN  script -q -e -c "sunbeam cluster deploy --accept-defaults --manifest /home/{{ user }}/manifest.yaml" /dev/null

- echo "\n"
- $RUN_AS juju switch openstack-machines
- echo "\n"
- $RUN_AS juju status
- echo "\n"
- $RUN_AS juju switch openstack
- echo "\n"
- $RUN_AS juju status

# Configure the cloud
- echo "\n\n-------- Configuring the cloud... --------\n"

- $RUN_AS_LOGIN  script -q -e -c "sunbeam configure --accept-defaults --openrc /home/{{ user }}/sunrc --manifest /home/{{ user }}/manifest.yaml" /dev/null

- echo "\n\n-------- Finished deploying Sunbeam, have fun!... --------\n"

