- $RUN_AS juju wait-for application placement-mysql-router --query="life==\"alive\" && status==\"active\""

# -------------------------------------------- Deploy OpenStack Dashboard --------------------------------------------
- echo "\n\n-------- Deploying OpenStack Dashboard... --------\n"

- $RUN_AS juju deploy --to lxd:2 --channel $OPENSTACK_DASHBOARD_VERSION openstack-dashboard

