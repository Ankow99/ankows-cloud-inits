- $RUN_AS juju wait-for application ncc-mysql-router --query="life==\"alive\" && status==\"active\""

# ------------------------------------------------ Deploy Placement ------------------------------------------------
- echo "\n\n-------- Deploying Placement... --------\n"

- $RUN_AS juju deploy --to lxd:3 --channel $PLACEMENT_VERSION placement

