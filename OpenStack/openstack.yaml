- $RUN_AS juju integrate ncc-mysql-router:shared-db nova-cloud-controller:shared-db

# Integrate Nova Cloud Controller
- echo "\n\n-------- Integrate Nova Cloud Controller... --------\n"

- $RUN_AS juju integrate nova-cloud-controller:identity-service keystone:identity-service
- $RUN_AS juju integrate nova-cloud-controller:amqp rabbitmq-server:amqp
- $RUN_AS juju integrate nova-cloud-controller:neutron-api neutron-api:neutron-api
